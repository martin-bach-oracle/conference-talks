name: CI-Pipeline for APEXWorld 2026 PL/SQL vs JavaScript
on:
  push:
  pull_request:

jobs:

  unit-tests-and-build:
    runs-on: ubuntu-latest
    services:
      oracle:
        image: gvenzl/oracle-free:23.26.1
        env:
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
          APP_USER: ${{ secrets.APP_USER_NAME }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
        ports:
          - 1521:1521
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      ords:
        image: container-registry.oracle.com/database/ords:25.4.0
        env:
          DBSERVICENAME: FREEPDB1
          DBHOST: oracle
          DBPORT: 1521
          ORACLE_PWD: ${{ secrets.ORACLE_PASSWORD }}
        ports:
          - 8080:8080
          - 8443:8443
        
    steps:
      - uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install test dependencies
        run: npm ci

      # set up SQLcl for all CI-related work
      - name: setup SQLcl
        uses: gvenzl/setup-oracle-sqlcl@v1
      
      # generate the artefact for testing. It's name contains the commit-sha to avoid problems
      - name: Extract commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Export TAG env
        run: echo "TAG=${{ steps.vars.outputs.sha_short }}" >> "$GITHUB_ENV"
      - name: build the SQLcl artifact
        run: |
          echo "project gen-artifact -debug -version ${TAG}" | sql ${{ secrets.APP_USER_NAME }}/${{ secrets.APP_USER_PASSWORD }}@localhost/FREEPDB1

      # use the generated artefact for deployment. Only way to be sure that the artefact is valid
      - name: Deploy the backend part of the application
        run: |
          {
            echo "whenever sqlerror exit"
            echo "project deploy -debug -verbose -file artifact/apexworld2026-${TAG}.zip"
          } | sql ${{ secrets.APP_USER_NAME }}/${{ secrets.APP_USER_PASSWORD }}@localhost/FREEPDB1

      - name: Wait for ORDS readiness
        run: |
          set +e
          READY=0
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ords/ 2>/dev/null)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "401" ]; then
              READY=1
              break
            fi
            sleep 5
          done

          if [ "$READY" -ne 1 ]; then
            echo "ORDS liveliness probe did not succeed. Waiting 1 additional minute before continuing."
            sleep 60
          fi
          set -e

      - name: Run action item API unit tests
        env:
          ORDS_BASE_URL: http://localhost:8080/ords/emily/js
        run: npm test -- tests/action-item.api.test.js

      - name: upload the SQLcl build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlcl-artifacts
          path: artifact
